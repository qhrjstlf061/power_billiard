# Render 배포 설정 (R4) — 이 저장소를 Render에 Blueprint로 연결하면 자동 적용
# 무료 티어: 15분 미접속 시 슬립 → 첫 접속 때 ~30초 웨이크 (클라이언트에 안내 UX 있음)
services:
  - type: web
    name: power-billiard
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # 같은 host(이 서버가 직접 서빙한 페이지)는 코드에서 항상 허용됨.
      # 이 목록은 "다른 곳에서 서빙되는 클라이언트"용 (예: GitHub Pages)
      - key: ALLOWED_ORIGINS
        value: https://qhrjstlf061.github.io
